version: '3.8'

# CONFIGURACIÓN CON SINCRONIZACIÓN AUTOMÁTICA
# Este archivo reemplaza app-data (volume) con bind mount a /home/Victor.90/easyapp-custom
# Los cambios en el código se reflejarán automáticamente sin necesidad de copiar archivos

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8015:80"
    volumes:
      # CAMBIO: bind mount en lugar de volume (read-only para nginx)
      - /home/Victor.90/easyapp-custom:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - easyapp-internal
    depends_on:
      - fpm
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M

  fpm:
    image: alextselegidis/easyappointments:latest
    environment:
      DB_HOST: easyapp-db:3306
      DB_NAME: easyappointments
      DB_USERNAME: easyapp_user
      DB_PASSWORD: EasyApp_Secure_2025!
      BASE_URL: https://citas.honeywhale.com.mx

      # SMTP Configuration (CORREGIDO)
      MAIL_PROTOCOL: smtp
      MAIL_SMTP_HOST: smtp.gmail.com
      MAIL_SMTP_PORT: 587
      MAIL_SMTP_CRYPTO: tls
      MAIL_SMTP_AUTH: 1
      MAIL_SMTP_USER: contacto@honeywhale.com.mx
      MAIL_SMTP_PASS: feyq lvkq geuk foln
      MAIL_FROM_ADDRESS: contacto@honeywhale.com.mx
      MAIL_FROM_NAME: Honey Whale Citas

      LANGUAGE: spanish
      GOOGLE_SYNC_FEATURE: 'TRUE'

    volumes:
      # CAMBIO: bind mount en lugar de volume (read-write para PHP-FPM)
      - /home/Victor.90/easyapp-custom:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - easyapp-internal
    depends_on:
      - easyapp-db
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  easyapp-db:
    image: mariadb:11.6
    environment:
      MYSQL_ROOT_PASSWORD: EasyApp_Root_2025!
      MYSQL_DATABASE: easyappointments
      MYSQL_USER: easyapp_user
      MYSQL_PASSWORD: EasyApp_Secure_2025!
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - easyapp-internal
    command: >
      --max_connections=100
      --innodb_buffer_pool_size=512M
      --innodb_log_file_size=128M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G

  backup:
    image: offen/docker-volume-backup:latest
    volumes:
      # Base de datos sigue usando volume (se respalda)
      - db-data:/backup/db-data:ro
      # CAMBIO: app-data ya no existe, ahora respaldamos directamente el directorio
      - /home/Victor.90/easyapp-custom:/backup/app-data:ro
      - /home/Victor.90/nas-seguro/backups/easy-appointments:/archive
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_FILENAME: easyappointments-%Y%m%d-%H%M%S.tar.gz
      BACKUP_RETENTION_DAYS: 14
    networks:
      - easyapp-internal
    deploy:
      replicas: 1

volumes:
  # CAMBIO: app-data ya no se necesita
  db-data:
  nginx-cache:

networks:
  easyapp-internal:
    driver: overlay

# VENTAJAS DE ESTA CONFIGURACIÓN:
# ✓ Los cambios en /home/Victor.90/easyapp-custom se reflejan INMEDIATAMENTE
# ✓ git pull en /home/Victor.90/easyapp-custom actualiza automáticamente el sitio
# ✓ No necesitas ejecutar sync_to_container.sh manualmente
# ✓ El backup sigue funcionando igual
# ✓ Solo necesitas reiniciar PHP-FPM si hay cambios en caché: docker exec ... kill -USR2 1
#
# IMPORTANTE:
# - Asegúrate que /home/Victor.90/easyapp-custom existe y tiene todos los archivos
# - Ejecuta git pull en ese directorio antes de hacer redeploy
# - Purga CloudFlare después de cambios en JS/CSS
